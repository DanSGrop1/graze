<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Nashville Burger Rater</title>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Burger Rater">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="theme-color" content="#1A0A00">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{--brown:#1A0A00;--brown-mid:#3B1F0E;--amber:#E8820C;--amber-dk:#C96E08;--amber-lt:#FDE8C8;--cream:#FFF8EE;--gold:#F5C07A;--text:#1A0A00;--text-2:#6B4226;--border:#E8D5BC;--surface:#FFFFFF;--bg:#FAF6F0;--green:#2E7D32;--green-bg:#E8F5E9;--red:#C62828;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);overscroll-behavior:none}
#shell{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.topbar{background:var(--brown);padding:calc(14px + env(safe-area-inset-top,0px)) 16px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-title{font-size:17px;font-weight:700;color:#fff;letter-spacing:-0.01em}
.topbar-sub{font-size:11px;color:var(--gold);letter-spacing:0.05em;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-icon{font-size:26px;line-height:1}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:background 0.3s}
.sync-dot.live{background:#4CAF50}.sync-dot.error{background:#F44336}.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
@keyframes spin{to{transform:rotate(360deg)}}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(72px + env(safe-area-inset-bottom,34px))}
.screen.hidden{display:none}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding-bottom:env(safe-area-inset-bottom,0px);padding-bottom:max(env(safe-area-inset-bottom,0px),0px);z-index:100}
.nav-btn{flex:1;padding:10px 0 8px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text-2);transition:color 0.15s;font-family:inherit}
.nav-btn.active{color:var(--amber)}
.nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.04em}
.offline-bar{background:var(--red);color:#fff;text-align:center;font-size:12px;font-weight:600;padding:6px;display:none;letter-spacing:0.03em}
.offline-bar.show{display:block}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:16px;color:var(--text-2)}
.loading-screen.hidden{display:none}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite}
.loading-screen p{font-size:14px}
/* Leaderboard */
.lb-hero{background:linear-gradient(160deg,var(--brown) 0%,var(--brown-mid) 100%);padding:20px 16px 16px;color:#fff}
.lb-hero h2{font-size:13px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.podium{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:8px;align-items:end;margin-bottom:4px}
.pod{background:rgba(255,255,255,0.08);border-radius:10px;padding:12px 8px 10px;text-align:center;border:1px solid rgba(255,255,255,0.1);cursor:pointer}
.pod.first{background:rgba(232,130,12,0.25);border-color:rgba(232,130,12,0.5)}
.pod-medal{font-size:22px;display:block;margin-bottom:4px}
.pod-name{font-size:11px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:6px;word-break:break-word}
.pod-score{font-size:20px;font-weight:800;color:var(--amber);line-height:1}
.pod-score-sub{font-size:10px;color:rgba(255,255,255,0.5);margin-top:2px}
.lb-list{padding:12px 12px 0}
.lb-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--surface);border-radius:10px;margin-bottom:8px;border:1px solid var(--border);cursor:pointer}
.lb-row:active{background:var(--cream)}
.lb-rank{font-size:13px;font-weight:700;color:var(--text-2);width:22px;text-align:center;flex-shrink:0}
.lb-info{flex:1;min-width:0}
.lb-name{font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-raters{font-size:11px;color:var(--text-2);margin-top:2px}
.lb-avg{font-size:18px;font-weight:800;color:var(--amber);flex-shrink:0}
.lb-bar-wrap{height:4px;background:var(--border);border-radius:2px;margin-top:4px;overflow:hidden}
.lb-bar{height:100%;background:linear-gradient(90deg,var(--amber),#F5B130);border-radius:2px;transition:width 0.4s ease}
.lb-empty{text-align:center;padding:48px 24px;color:var(--text-2)}
.lb-empty p{font-size:14px;line-height:1.6}
/* Rankings */
.rank-tabs{display:flex;padding:12px 12px 8px}
.rank-tab{flex:1;padding:9px;font-size:12px;font-weight:700;font-family:inherit;background:var(--bg);border:1px solid var(--border);color:var(--text-2);cursor:pointer;transition:all 0.15s}
.rank-tab:first-child{border-radius:8px 0 0 8px}.rank-tab:last-child{border-radius:0 8px 8px 0}
.rank-tab.active{background:var(--amber);border-color:var(--amber);color:#fff}
.back-btn{display:flex;align-items:center;gap:6px;padding:14px 16px 4px;font-size:13px;font-weight:600;color:var(--amber);background:none;border:none;cursor:pointer;font-family:inherit}
.rank-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:0 12px 12px;overflow:hidden}
.rank-card-top{padding:14px 16px;background:var(--brown);display:flex;justify-content:space-between;align-items:center}
.rank-card-name{font-size:15px;font-weight:700;color:#fff}
.rank-card-score{font-size:22px;font-weight:800;color:var(--amber)}
.rank-kpis{padding:12px 16px}
.kpi-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
.kpi-row:last-child{border-bottom:none}
.kpi-row-name{font-size:12px;color:var(--text-2);flex:0 0 140px}
.kpi-scores{display:flex;gap:6px;align-items:center;flex:1}
.kpi-pill{font-size:11px;font-weight:700;padding:2px 7px;border-radius:20px}
.kpi-pill.kg{background:#E3F2FD;color:#1565C0}.kpi-pill.dg{background:#FCE4EC;color:#C62828}
.kpi-weight{font-size:10px;color:var(--text-2);margin-left:auto}
/* Rater */
.rater-section{padding:14px 14px 0}
.field-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2);margin-bottom:6px;display:block}
.field-input{width:100%;padding:11px 13px;font-size:15px;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);outline:none;-webkit-appearance:none;appearance:none;transition:border-color 0.15s,box-shadow 0.15s}
.field-input:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,130,12,0.15)}
.field-group{margin-bottom:12px}
.rater-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rater-btn{padding:11px;font-size:15px;font-weight:700;font-family:inherit;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;cursor:pointer;color:var(--text-2);transition:all 0.15s}
.rater-btn.active{background:var(--amber);border-color:var(--amber);color:#fff}
.divider{height:1px;background:var(--border);margin:16px 14px 0}
.kpi-section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2);padding:14px 14px 8px}
.kpi-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 13px;margin:0 14px 8px;transition:border-color 0.15s}
.kpi-block.scored{border-color:var(--amber-lt);background:#FFFCF8}
.kpi-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.kpi-name{font-size:13px;font-weight:600;color:var(--text)}
.kpi-meta{display:flex;align-items:baseline;gap:7px}
.kpi-wt{font-size:10px;color:var(--text-2)}
.kpi-val{font-size:19px;font-weight:800;color:var(--amber);min-width:26px;text-align:right}
.kpi-val.empty{color:var(--border)}
.btn-row{display:grid;grid-template-columns:repeat(10,1fr);gap:3px}
.score-btn{aspect-ratio:1;min-height:28px;font-size:11px;font-weight:600;font-family:inherit;background:var(--bg);border:1px solid var(--border);border-radius:5px;cursor:pointer;color:var(--text-2);transition:all 0.1s;padding:0}
.score-btn.lit{background:var(--amber);border-color:var(--amber);color:#fff}
.score-btn:active{transform:scale(0.9)}
.score-strip{margin:6px 14px 0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 14px}
.score-strip-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.score-strip-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2)}
.score-num{font-size:26px;font-weight:800;color:var(--amber)}
.score-denom{font-size:13px;color:var(--text-2)}
.progress-track{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--amber),#F5B130);border-radius:3px;transition:width 0.3s ease}
.kpi-progress{font-size:11px;color:var(--text-2);margin-top:6px;text-align:right}
.actions{padding:14px}
.btn-save{width:100%;padding:15px;font-size:16px;font-weight:700;font-family:inherit;background:var(--amber);color:#fff;border:none;border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s}
.btn-save:active{background:var(--amber-dk);transform:scale(0.98)}
.btn-save:disabled{background:var(--border);color:var(--text-2);cursor:not-allowed;transform:none}
.btn-reset{width:100%;padding:10px;font-size:14px;font-family:inherit;color:var(--text-2);background:transparent;border:1px solid var(--border);border-radius:10px;cursor:pointer;margin-top:8px}
.success-banner{display:none;background:var(--green-bg);border:1px solid #A5D6A7;border-radius:10px;padding:14px 16px;margin:0 14px;text-align:center}
.success-banner.show{display:block}
.success-banner h3{font-size:15px;font-weight:700;color:var(--green)}
.success-banner p{font-size:13px;color:#388E3C;margin-top:3px}
.notes-field{margin:0 14px}
.notes-field textarea{width:100%;padding:11px 13px;font-size:14px;font-family:inherit;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);outline:none;resize:none;line-height:1.5;transition:border-color 0.15s}
.notes-field textarea:focus{border-color:var(--amber);box-shadow:0 0 0 3px rgba(232,130,12,0.15)}
.toast{position:fixed;bottom:calc(84px + env(safe-area-inset-bottom,34px));left:50%;transform:translateX(-50%) translateY(8px);background:var(--brown);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.25)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="shell">
  <div class="topbar">
    <div>
      <div class="topbar-title">Nashville Burger Rater</div>
      <div class="topbar-sub">KG &amp; DG · Official Scorecard</div>
    </div>
    <div class="topbar-right">
      <div class="sync-dot syncing" id="sync-dot" title="Connecting…"></div>
      <div class="topbar-icon">🍔</div>
    </div>
  </div>
  <div class="offline-bar" id="offline-bar">⚠️ Offline — ratings will sync when reconnected</div>

  <div class="loading-screen" id="loading-screen">
    <div class="spinner"></div>
    <p>Loading ratings…</p>
  </div>

  <div class="screen hidden" id="screen-lb">
    <div class="lb-hero">
      <h2>🏆 Leaderboard</h2>
      <div class="podium" id="podium"></div>
    </div>
    <div class="lb-list" id="lb-list"></div>
  </div>

  <div class="screen hidden" id="screen-rankings">
    <div id="rankings-content"></div>
  </div>

  <div class="screen hidden" id="screen-rater">
    <div class="rater-section" style="padding-top:16px">
      <div class="field-group">
        <label class="field-label">Restaurant</label>
        <input class="field-input" type="text" id="restaurant" placeholder="e.g. Hattie B's, Peg Leg Porker…" autocomplete="off">
      </div>
      <div class="field-group">
        <label class="field-label">Who's rating?</label>
        <div class="rater-grid">
          <button class="rater-btn" data-rater="KG" onclick="selectRater('KG')">KG</button>
          <button class="rater-btn" data-rater="DG" onclick="selectRater('DG')">DG</button>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Date visited</label>
        <input class="field-input" type="date" id="visit-date">
      </div>
    </div>
    <div class="divider"></div>
    <div class="kpi-section-label">KPI scores — tap 1–10</div>
    <div id="kpi-list"></div>
    <div class="score-strip">
      <div class="score-strip-top">
        <span class="score-strip-label">Weighted score</span>
        <div><span class="score-num" id="total-score">—</span><span class="score-denom"> / 10</span></div>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="kpi-progress" id="kpi-progress">0 of 11 rated</div>
    </div>
    <div class="divider" style="margin-top:14px"></div>
    <div class="kpi-section-label">Notes (optional)</div>
    <div class="notes-field">
      <textarea id="notes" rows="3" placeholder="Standout details, sauce, vibe…"></textarea>
    </div>
    <div class="success-banner" id="success-banner">
      <h3>✅ Rating saved!</h3>
      <p id="success-msg"></p>
    </div>
    <div class="actions">
      <button class="btn-save" id="btn-save" onclick="saveRating()">💾 Save rating</button>
      <button class="btn-reset" onclick="resetForm()">Clear form</button>
    </div>
  </div>

  <nav class="nav">
    <button class="nav-btn" id="nav-lb" onclick="showScreen('lb')">
      <svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span class="nav-label">Leaderboard</span>
    </button>
    <button class="nav-btn" id="nav-rankings" onclick="showScreen('rankings')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      <span class="nav-label">Rankings</span>
    </button>
    <button class="nav-btn" id="nav-rater" onclick="showScreen('rater')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span class="nav-label">Rate</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<script>
// ══ PASTE YOUR FIREBASE CONFIG HERE ══════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyB8oSB-K7MJ0jiJgUtTzFra0Qsl8ZcjF2w",
  authDomain:        "nashville-burger-rater.firebaseapp.com",
  databaseURL:       "https://nashville-burger-rater-default-rtdb.firebaseio.com",
  projectId:         "nashville-burger-rater",
  storageBucket:     "nashville-burger-rater.firebasestorage.app",
  messagingSenderId: "111439093518",
  appId:             "1:111439093518:web:1b30b7e3a45a4c9531415f"
};
// ═════════════════════════════════════════════════════════════════════════════

const KPIs=[{key:'flavor',label:'Flavor',weight:.2},{key:'meat_q',label:'Quality of meat',weight:.2},{key:'mouthfeel',label:'Mouthfeel',weight:.1},{key:'ratio',label:'Meat ratio',weight:.1},{key:'bun',label:'Bun',weight:.1},{key:'sides',label:'Sides',weight:.05},{key:'roi',label:'ROI / value',weight:.05},{key:'novelty',label:'Novelty',weight:.05},{key:'dining',label:'Dining experience',weight:.05},{key:'service',label:'Customer service',weight:.05},{key:'craving',label:'The craving (30-day)',weight:.05}];

const SEED=[
  {restaurant:"Dreamburger",rater:"KG",date:"2026-04-17",flavor:8,meat_q:8,mouthfeel:8,ratio:8,bun:7,sides:2,roi:7,novelty:6,dining:4,service:5,craving:null,notes:""},
  {restaurant:"Dreamburger",rater:"DG",date:"2026-04-17",flavor:8,meat_q:9,mouthfeel:6,ratio:7,bun:5,sides:2,roi:6,novelty:5,dining:3,service:4,craving:null,notes:""},
  {restaurant:"Gabby's Burger",rater:"DG",date:"2026-04-24",flavor:7,meat_q:4,mouthfeel:4,ratio:9,bun:7,sides:7,roi:7,novelty:3,dining:8,service:8,craving:null,notes:"Small town feel."},
  {restaurant:"Gabby's Burger",rater:"KG",date:"2026-04-24",flavor:9,meat_q:7,mouthfeel:6,ratio:9,bun:8,sides:7,roi:8,novelty:6,dining:9,service:9,craving:null,notes:"A bit drippy but solid burger. Would recommend."},
  {restaurant:"Cledis",rater:"DG",date:"2026-05-08",flavor:9,meat_q:9,mouthfeel:7,ratio:10,bun:5,sides:6,roi:8,novelty:9,dining:8,service:8,craving:null,notes:"The best I have had so far."},
  {restaurant:"Cledis",rater:"KG",date:"2026-05-08",flavor:9,meat_q:9,mouthfeel:9,ratio:9,bun:8,sides:9,roi:9,novelty:9,dining:8,service:8,craving:null,notes:"Cledis burgers add beef. Very good"},
  {restaurant:"Schulman's",rater:"KG",date:"2026-05-01",flavor:4,meat_q:3,mouthfeel:6,ratio:8,bun:8,sides:8,roi:7,novelty:2,dining:6,service:4,craving:null,notes:"Meat was a let down. Nice veggies. Nothing to write home about."}
];

let db=null,ratings=[],currentScreen='lb',rankingsTab='all',selectedRater=null;
const scores={};

function calcWeighted(r){let w=0;KPIs.forEach(k=>{if(r[k.key]!=null)w+=r[k.key]*k.weight;});return parseFloat(w.toFixed(2));}

function initFirebase(){
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    setSyncStatus('syncing');
    db.ref('ratings').on('value',snap=>{
      const data=snap.val();
      if(!data){
        writeSeedData();
      } else {
        ratings=Object.values(data).map(r=>({...r,weighted:r.weighted!=null?r.weighted:calcWeighted(r)}));
        onDataLoaded();
      }
      setSyncStatus('live');
    },err=>{
      console.error(err);
      setSyncStatus('error');
      ratings=SEED.map(r=>({...r,weighted:calcWeighted(r)}));
      onDataLoaded();
    });
    db.ref('.info/connected').on('value',snap=>{
      const ok=snap.val();
      document.getElementById('offline-bar').classList.toggle('show',!ok);
      if(ok)setSyncStatus('live');
    });
  }catch(e){
    console.error(e);setSyncStatus('error');
    ratings=SEED.map(r=>({...r,weighted:calcWeighted(r)}));
    onDataLoaded();
  }
}

function writeSeedData(){
  const updates={};
  SEED.forEach(r=>{const k=db.ref('ratings').push().key;updates[k]={...r,weighted:calcWeighted(r)};});
  db.ref('ratings').update(updates);
}

function onDataLoaded(){
  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('screen-lb').classList.remove('hidden');
  document.getElementById('nav-lb').classList.add('active');
  renderLeaderboard();renderRankings();
}

function setSyncStatus(s){
  const d=document.getElementById('sync-dot');
  d.className='sync-dot '+s;
  d.title={live:'Synced',syncing:'Connecting…',error:'Offline mode'}[s]||'';
}

function normalizeKey(name){
  // Trim whitespace, collapse internal spaces, normalize apostrophes, lowercase for key
  return (name||'').trim().replace(/\s+/g,' ').replace(/[\u2018\u2019\u201A\u201B\u0060\u00B4]/g,"'").toLowerCase();
}

function computeLeaderboard(){
  const map={};      // key = normalized name
  const display={};  // key -> first seen display name
  ratings.forEach(r=>{
    if(!r.restaurant)return;
    const key=normalizeKey(r.restaurant);
    if(!key)return;
    if(!map[key]){map[key]={kg:[],dg:[],all:[]};display[key]=r.restaurant.trim();}
    const w=r.weighted!=null?r.weighted:calcWeighted(r);
    if(r.rater==='KG')map[key].kg.push(w);
    else if(r.rater==='DG')map[key].dg.push(w);
    map[key].all.push(w);
  });
  const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
  const fmt=v=>v!=null?parseFloat(v.toFixed(2)):null;
  const rows=Object.entries(map).map(([key,d])=>({
    name:display[key],
    kg:fmt(avg(d.kg)),dg:fmt(avg(d.dg)),
    avg:(d.kg.length&&d.dg.length)?fmt((avg(d.kg)+avg(d.dg))/2):fmt(avg(d.all))
  }));
  rows.sort((a,b)=>(b.avg||0)-(a.avg||0));
  return rows;
}

function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.remove('hidden');
  const nb=document.getElementById('nav-'+name);if(nb)nb.classList.add('active');
  currentScreen=name;
  if(name==='lb')renderLeaderboard();
  if(name==='rankings')renderRankings();
  if(name==='rater')document.getElementById('screen-rater').scrollTop=0;
}

function renderLeaderboard(){
  const lb=computeLeaderboard();
  const podium=document.getElementById('podium');
  const list=document.getElementById('lb-list');
  podium.innerHTML='';list.innerHTML='';
  if(!lb.length){list.innerHTML='<div class="lb-empty"><p>No ratings yet.<br>Tap Rate to add the first one!</p></div>';return;}
  const medals=['🥇','🥈','🥉'];
  [1,0,2].forEach(idx=>{
    const r=lb[idx];
    if(!r){podium.appendChild(document.createElement('div'));return;}
    const p=document.createElement('div');
    p.className='pod'+(idx===0?' first':'');
    p.innerHTML=`<span class="pod-medal">${medals[idx]}</span><div class="pod-name">${r.name}</div><div class="pod-score">${r.avg!=null?r.avg.toFixed(2):'—'}</div><div class="pod-score-sub">avg</div>`;
    p.onclick=()=>showDetail(r.name);
    podium.appendChild(p);
  });
  lb.slice(3).forEach((r,i)=>{
    const row=document.createElement('div');row.className='lb-row';
    row.innerHTML=`<div class="lb-rank">${i+4}</div><div class="lb-info"><div class="lb-name">${r.name}</div><div class="lb-raters">${r.kg!=null?'KG '+r.kg.toFixed(2):''}${r.kg!=null&&r.dg!=null?' · ':''}${r.dg!=null?'DG '+r.dg.toFixed(2):''}</div><div class="lb-bar-wrap"><div class="lb-bar" style="width:${((r.avg||0)/10*100).toFixed(1)}%"></div></div></div><div class="lb-avg">${r.avg!=null?r.avg.toFixed(2):'—'}</div>`;
    row.onclick=()=>showDetail(r.name);list.appendChild(row);
  });
  const badge=document.createElement('div');
  badge.style.cssText='text-align:center;padding:8px 0 4px;font-size:11px;color:var(--text-2)';
  badge.textContent=`${lb.length} restaurant${lb.length!==1?'s':''} · ${ratings.length} total rating${ratings.length!==1?'s':''}`;
  list.appendChild(badge);
}

function renderRankings(){
  const lb=computeLeaderboard();
  const content=document.getElementById('rankings-content');
  let sorted;
  if(rankingsTab==='kg')sorted=[...lb].filter(r=>r.kg!=null).sort((a,b)=>b.kg-a.kg);
  else if(rankingsTab==='dg')sorted=[...lb].filter(r=>r.dg!=null).sort((a,b)=>b.dg-a.dg);
  else sorted=lb;
  const medals={0:'🥇',1:'🥈',2:'🥉'};
  const tabs=`<div class="rank-tabs"><button class="rank-tab ${rankingsTab==='all'?'active':''}" onclick="setRankTab('all')">Combined</button><button class="rank-tab ${rankingsTab==='kg'?'active':''}" onclick="setRankTab('kg')">KG</button><button class="rank-tab ${rankingsTab==='dg'?'active':''}" onclick="setRankTab('dg')">DG</button></div>`;
  if(!sorted.length){content.innerHTML=tabs+'<div class="lb-empty"><p>No ratings yet.</p></div>';return;}
  content.innerHTML=tabs+`<div style="padding:0 12px">${sorted.map((r,i)=>{
    const score=rankingsTab==='kg'?r.kg:rankingsTab==='dg'?r.dg:r.avg;
    return `<div class="lb-row" onclick="showDetail('${r.name.replace(/'/g,"\\'").replace(/"/g,'&quot;')}')"><div class="lb-rank">${medals[i]!=null?medals[i]:i+1}</div><div class="lb-info"><div class="lb-name">${r.name}</div><div class="lb-raters">${r.kg!=null?'KG '+r.kg.toFixed(2):''}${r.kg!=null&&r.dg!=null?' · ':''}${r.dg!=null?'DG '+r.dg.toFixed(2):''}</div><div class="lb-bar-wrap"><div class="lb-bar" style="width:${((score||0)/10*100).toFixed(1)}%"></div></div></div><div class="lb-avg">${score!=null?score.toFixed(2):'—'}</div></div>`;
  }).join('')}</div>`;
}

function setRankTab(tab){rankingsTab=tab;renderRankings();}

function showDetail(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-rankings').classList.remove('hidden');
  document.getElementById('nav-rankings').classList.add('active');
  currentScreen='rankings';
  const rr=ratings.filter(r=>r.restaurant===name);
  const kg=rr.find(r=>r.rater==='KG');const dg=rr.find(r=>r.rater==='DG');
  const lb=computeLeaderboard().find(r=>r.name===name);
  const kpiRows=KPIs.map(kpi=>{
    const kv=kg?kg[kpi.key]:null;const dv=dg?dg[kpi.key]:null;
    return `<div class="kpi-row"><div class="kpi-row-name">${kpi.label}</div><div class="kpi-scores">${kv!=null?`<span class="kpi-pill kg">KG ${kv}</span>`:''}${dv!=null?`<span class="kpi-pill dg">DG ${dv}</span>`:''}</div><div class="kpi-weight">${Math.round(kpi.weight*100)}%</div></div>`;
  }).join('');
  const notesHtml=rr.filter(r=>r.notes).map(r=>`<div style="font-size:12px;color:var(--text-2);padding:6px 0;border-bottom:1px solid var(--border)"><span style="font-weight:700;color:var(--amber)">${r.rater}</span> — ${r.notes}</div>`).join('');
  document.getElementById('rankings-content').innerHTML=`
    <button class="back-btn" onclick="renderRankings()">
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>All rankings
    </button>
    <div class="rank-card">
      <div class="rank-card-top">
        <div><div class="rank-card-name">${name}</div><div style="font-size:11px;color:var(--gold);margin-top:2px">${lb?`KG ${lb.kg!=null?lb.kg.toFixed(2):'—'}  ·  DG ${lb.dg!=null?lb.dg.toFixed(2):'—'}`:''}</div></div>
        <div class="rank-card-score">${lb&&lb.avg!=null?lb.avg.toFixed(2):'—'}</div>
      </div>
      <div class="rank-kpis">${kpiRows}</div>
      ${notesHtml?`<div style="padding:0 16px 12px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-2);margin-bottom:6px">Notes</div>${notesHtml}</div>`:''}
    </div>`;
}

function buildKPIs(){
  const list=document.getElementById('kpi-list');
  KPIs.forEach(kpi=>{
    const block=document.createElement('div');block.className='kpi-block';block.id='block-'+kpi.key;
    block.innerHTML=`<div class="kpi-top"><span class="kpi-name">${kpi.label}</span><div class="kpi-meta"><span class="kpi-wt">${Math.round(kpi.weight*100)}%</span><span class="kpi-val empty" id="val-${kpi.key}">—</span></div></div><div class="btn-row" id="row-${kpi.key}"></div>`;
    const row=block.querySelector('.btn-row');
    for(let i=1;i<=10;i++){const b=document.createElement('button');b.className='score-btn';b.textContent=i;b.onclick=()=>setScore(kpi.key,i);row.appendChild(b);}
    list.appendChild(block);
  });
}

function setScore(key,val){
  scores[key]=val;
  document.getElementById('row-'+key).querySelectorAll('.score-btn').forEach((b,i)=>b.classList.toggle('lit',i<val));
  const v=document.getElementById('val-'+key);v.textContent=val;v.classList.remove('empty');
  document.getElementById('block-'+key).classList.add('scored');
  updateTotal();
}

function updateTotal(){
  let w=0,count=0;KPIs.forEach(k=>{if(scores[k.key]!=null){w+=scores[k.key]*k.weight;count++;}});
  const el=document.getElementById('total-score');const fill=document.getElementById('progress-fill');
  document.getElementById('kpi-progress').textContent=`${count} of ${KPIs.length} rated`;
  if(count>0){el.textContent=w.toFixed(2);fill.style.width=(w/10*100).toFixed(1)+'%';}
  else{el.textContent='—';fill.style.width='0%';}
}

function selectRater(r){selectedRater=r;document.querySelectorAll('.rater-btn').forEach(b=>b.classList.toggle('active',b.dataset.rater===r));}

async function saveRating(){
  const restaurant=document.getElementById('restaurant').value.trim();
  const dateVal=document.getElementById('visit-date').value;
  const notes=document.getElementById('notes').value.trim();
  if(!restaurant){showToast('Add a restaurant name');return;}
  if(!selectedRater){showToast('Pick a rater — KG or DG');return;}
  const missing=KPIs.filter(k=>scores[k.key]==null);
  if(missing.length){showToast(`${missing.length} KPI${missing.length>1?'s':''} still need a score`);return;}
  const btn=document.getElementById('btn-save');btn.disabled=true;btn.textContent='Saving…';
  let w=0;KPIs.forEach(k=>{w+=scores[k.key]*k.weight;});
  const entry={restaurant,rater:selectedRater,date:dateVal||new Date().toISOString().split('T')[0],notes,weighted:parseFloat(w.toFixed(2)),savedAt:new Date().toISOString()};
  KPIs.forEach(k=>{entry[k.key]=scores[k.key];});
  try{
    if(db){await db.ref('ratings').push(entry);}
    else{ratings.push({...entry});renderLeaderboard();renderRankings();}
    document.getElementById('success-banner').classList.add('show');
    document.getElementById('success-msg').textContent=`${restaurant} (${selectedRater}) — ${w.toFixed(2)}/10 saved.`;
    document.getElementById('screen-rater').scrollTop=0;
    showToast('Rating saved! 🍔');
  }catch(e){showToast('Save failed — check connection');console.error(e);}
  finally{btn.disabled=false;btn.innerHTML='💾 Save rating';}
}

function resetForm(){
  document.getElementById('restaurant').value='';document.getElementById('notes').value='';
  document.getElementById('visit-date').value=new Date().toISOString().split('T')[0];
  selectedRater=null;document.querySelectorAll('.rater-btn').forEach(b=>b.classList.remove('active'));
  Object.keys(scores).forEach(k=>delete scores[k]);
  KPIs.forEach(kpi=>{
    const v=document.getElementById('val-'+kpi.key);v.textContent='—';v.classList.add('empty');
    document.getElementById('row-'+kpi.key).querySelectorAll('.score-btn').forEach(b=>b.classList.remove('lit'));
    document.getElementById('block-'+kpi.key).classList.remove('scored');
  });
  document.getElementById('success-banner').classList.remove('show');updateTotal();
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}

buildKPIs();
document.getElementById('visit-date').value=new Date().toISOString().split('T')[0];
initFirebase();
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
</body>
